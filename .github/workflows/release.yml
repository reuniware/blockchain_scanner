name: Release

on:
  workflow_dispatch:  # Déclenchement manuel depuis l'interface GitHub
    inputs:
      tag:
        description: 'Version tag (ex: v1.1.0)'
        required: true
        type: string
  push:
    tags:
      - 'v*'  # Déclenché par git tag v1.0.0, v1.1.0, etc.

permissions:
  contents: write  # Nécessaire pour créer la GitHub Release
  id-token: write  # Nécessaire pour PyPI (OpenID Connect / trusted publishing)

env:
  # Déterminer le tag selon le déclencheur
  # - workflow_dispatch : utilise l'input tag (saisie manuelle)
  # - push tag : utilise github.ref_name (ex: v1.1.0)
  TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  check-version:
    name: Vérifier la version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Nécessaire pour git log

      - name: Extraire la version depuis main.py
        id: extract
        run: |
          VERSION=$(grep '^VERSION =' main.py | sed "s/VERSION = //;s/\"//g")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version dans main.py : $VERSION"
          echo "Tag : ${TAG#v}"

      - name: Vérifier que le tag correspond à la version
        run: |
          VERSION=$(grep '^VERSION =' main.py | sed "s/VERSION = //;s/\"//g")
          TAG_WITHOUT_V="${TAG#v}"
          if [ "$VERSION" != "$TAG_WITHOUT_V" ]; then
            echo "⚠️  Mismatch: main.py version=$VERSION mais tag=$TAG"
            echo "   Tu dois mettre à jour VERSION dans main.py avant de release."
            exit 1
          fi
          echo "✅ Version main.py ($VERSION) == Tag ($TAG_WITHOUT_V)"

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [check-version]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python syntax check
        run: |
          find . -name '*.py' -not -path './.mythril-env/*' -not -path './exploit/*' \
            -exec python -m py_compile {} \;

      - name: Run Mythril pattern tests
        run: |
          python test_mythril_patterns.py
        timeout-minutes: 2

  release:
    name: Générer la GitHub Release
    runs-on: ubuntu-latest
    needs: [check-version, test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Nécessaire pour git log des tags

      - name: Build le package pip
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build
          echo "✅ Package build :"
          ls -la dist/

      - name: Générer les notes de release
        run: |
          TAG_WITHOUT_V="${TAG#v}"

          # Trouver le tag précédent pour le changelog
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1 || echo "")
          if [ -z "$PREV_TAG" ]; then
            RANGE=""
            PREV_TAG="début"
          else
            RANGE="${PREV_TAG}..${TAG}"
          fi

          # Compter les commits depuis le dernier tag
          if [ -n "$RANGE" ]; then
            COMMIT_COUNT=$(git rev-list "$RANGE" --count 2>/dev/null || echo "?")
          else
            COMMIT_COUNT=$(git rev-list --count HEAD 2>/dev/null || echo "?")
          fi

          echo "## Scanner Blockchain v${TAG_WITHOUT_V}" > release_notes.md
          echo "" >> release_notes.md
          echo "### 🚀 Changements" >> release_notes.md
          echo "" >> release_notes.md

          if [ -n "$RANGE" ]; then
            git log --oneline --no-decorate "$RANGE" | while read line; do
              echo "- $line" >> release_notes.md
            done
          else
            git log --oneline --no-decorate -20 HEAD | while read line; do
              echo "- $line" >> release_notes.md
            done
          fi

          echo "" >> release_notes.md
          echo "### 📦 Détails" >> release_notes.md
          echo "" >> release_notes.md
          echo "- **Commits depuis la dernière release :** $COMMIT_COUNT" >> release_notes.md
          echo "- **Python :** 3.10+" >> release_notes.md
          echo "- **Node (Hardhat) :** 18+" >> release_notes.md
          echo "" >> release_notes.md

          echo "### 🔧 Prérequis" >> release_notes.md
          echo "" >> release_notes.md
          echo '```bash' >> release_notes.md
          echo "pip install -r requirements.txt" >> release_notes.md
          echo '```' >> release_notes.md
          echo "" >> release_notes.md

          echo "### 🏁 Démarrage rapide" >> release_notes.md
          echo "" >> release_notes.md
          echo '```bash' >> release_notes.md
          echo "python main.py" >> release_notes.md
          echo '```' >> release_notes.md
          echo "" >> release_notes.md

      - name: Créer la GitHub Release avec artefacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$TAG" \
            --title "Blockchain Scanner v${TAG#v}" \
            --notes-file release_notes.md \
            dist/*.whl dist/*.tar.gz

          echo "✅ Release $TAG créée avec artefacts :"
          ls -la dist/

      - name: Publier sur PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          verbose: true
