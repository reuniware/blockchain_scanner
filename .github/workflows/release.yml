name: Release

on:
  push:
    tags:
      - 'v*'  # Déclenché par git tag v1.0.0, v1.1.0, etc.

permissions:
  contents: write  # Nécessaire pour créer la GitHub Release

jobs:
  check-version:
    name: Vérifier la version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      tag: ${{ steps.extract.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Nécessaire pour git log

      - name: Extraire la version depuis main.py
        id: extract
        run: |
          VERSION=$(grep '^VERSION =' main.py | sed "s/VERSION = //;s/\"//g")
          TAG="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Version dans main.py : $VERSION"
          echo "Tag git : $TAG"

      - name: Vérifier que le tag correspond à la version
        run: |
          VERSION=$(grep '^VERSION =' main.py | sed "s/VERSION = //;s/\"//g")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "⚠️  Mismatch: main.py version=$VERSION mais tag=$TAG"
            echo "   Tu dois mettre à jour VERSION dans main.py avant de tagger."
            exit 1
          fi
          echo "✅ Version main.py ($VERSION) == Tag ($TAG)"

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [check-version]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python syntax check
        run: |
          find . -name '*.py' -not -path './.mythril-env/*' -not -path './exploit/*' \
            -exec python -m py_compile {} \;

      - name: Run Mythril pattern tests
        run: |
          python test_mythril_patterns.py
        timeout-minutes: 2

  release:
    name: Générer la GitHub Release
    runs-on: ubuntu-latest
    needs: [check-version, test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Nécessaire pour git log des tags

      - name: Générer les notes de release
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME#v}"

          # Trouver le tag précédent pour le changelog
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1 || echo "")
          if [ -z "$PREV_TAG" ]; then
            RANGE=""
            PREV_TAG="début"
          else
            RANGE="${PREV_TAG}..${GITHUB_REF_NAME}"
          fi

          # Compter les commits depuis le dernier tag
          if [ -n "$RANGE" ]; then
            COMMIT_COUNT=$(git rev-list "$RANGE" --count 2>/dev/null || echo "?")
          else
            COMMIT_COUNT=$(git rev-list --count HEAD 2>/dev/null || echo "?")
          fi

          # Extraire les stats du projet (sortie du scanner)
          echo "## Scanner Blockchain v${TAG}" > release_notes.md
          echo "" >> release_notes.md
          echo "### 🚀 Changements" >> release_notes.md
          echo "" >> release_notes.md

          if [ -n "$RANGE" ]; then
            git log --oneline --no-decorate "$RANGE" | while read line; do
              echo "- $line" >> release_notes.md
            done
          else
            git log --oneline --no-decorate -20 HEAD | while read line; do
              echo "- $line" >> release_notes.md
            done
          fi

          echo "" >> release_notes.md
          echo "### 📦 Détails" >> release_notes.md
          echo "" >> release_notes.md
          echo "- **Commits depuis la dernière release :** $COMMIT_COUNT" >> release_notes.md
          echo "- **Python :** 3.10+" >> release_notes.md
          echo "- **Node (Hardhat) :** 18+" >> release_notes.md
          echo "" >> release_notes.md

          # Ajouter les infos du projet
          echo "### 🔧 Prérequis" >> release_notes.md
          echo "" >> release_notes.md
          echo "\`\`\`bash" >> release_notes.md
          echo "pip install -r requirements.txt" >> release_notes.md
          echo "\`\`\`" >> release_notes.md
          echo "" >> release_notes.md

          echo "### 🏁 Démarrage rapide" >> release_notes.md
          echo "" >> release_notes.md
          echo "\`\`\`bash" >> release_notes.md
          echo "python main.py" >> release_notes.md
          echo "\`\`\`" >> release_notes.md
          echo "" >> release_notes.md

          echo "notes_file=release_notes.md" >> $GITHUB_OUTPUT

      - name: Créer la GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          gh release create "$TAG" \
            --title "Blockchain Scanner v${TAG#v}" \
            --notes-file release_notes.md \
            --verify-tag

          echo "✅ Release $TAG créée sur GitHub"
